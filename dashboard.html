<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 짠테크 대시보드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --surface2: #221f35;
    --border: #2e2a45;
    --accent: #f7c948;
    --accent2: #ff6b6b;
    --accent3: #6bffb8;
    --accent4: #7b8cde;
    --accent5: #ff9f43;
    --text: #e8e6f0;
    --text-muted: #7a7590;
    --text-dim: #4a4660;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
    max-width: 720px;
    margin: 0 auto;
  }

  .header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .header h1 { font-size: 22px; font-weight: 700; color: var(--accent); }
  .header p  { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  .add-btn {
    background: var(--accent); color: #0f0e17;
    border: none; padding: 10px 18px;
    border-radius: 10px; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .add-btn:hover { background: #ffd966; transform: translateY(-1px); }

  /* Summary */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px; margin-bottom: 20px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 14px;
    position: relative; overflow: hidden;
  }
  .summary-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
  }
  .summary-card.s1::before { background: var(--accent4); }
  .summary-card.s2::before { background: var(--accent5); }
  .summary-card.s3::before { background: var(--accent3); }
  .summary-card.s4::before { background: var(--accent2); }
  .summary-card .label { font-size: 10px; color: var(--text-muted); margin-bottom: 5px; }
  .summary-card .value { font-size: 20px; font-weight: 700; }
  .summary-card.s1 .value { color: var(--accent4); }
  .summary-card.s2 .value { color: var(--accent5); }
  .summary-card.s3 .value { color: var(--accent3); }
  .summary-card.s4 .value { color: var(--accent2); }
  .summary-card .sub { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

  /* Legend */
  .legend {
    display: flex; gap: 14px; flex-wrap: wrap;
    margin-bottom: 16px; padding: 10px 14px;
    background: var(--surface); border-radius: 10px;
    border: 1px solid var(--border);
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
  .legend-badge { padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; }
  .lb1 { background: rgba(123,140,222,0.15); color: var(--accent4); }
  .lb2 { background: rgba(255,159,67,0.15);  color: var(--accent5); }
  .lb3 { background: rgba(107,255,184,0.12); color: var(--accent3); }
  .legend-tip { font-size: 10px; color: var(--text-dim); margin-left: auto; }

  /* Tabs */
  .tabs-wrapper { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }

  .tabs-label {
    font-size: 10px; color: var(--text-dim);
    padding: 0 4px; letter-spacing: 0.3px; font-weight: 500;
  }

  .tabs {
    display: flex; gap: 4px;
    background: var(--surface); border-radius: 12px;
    padding: 4px; border: 1px solid var(--border);
  }
  .tab {
    flex: 1; padding: 7px; border: none;
    background: transparent; color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px; border-radius: 8px;
    cursor: pointer; transition: all 0.2s; font-weight: 500;
  }
  .tab.active { background: var(--accent); color: #0f0e17; font-weight: 700; }
  .tabs.status-tabs .tab.active { background: var(--accent4); }
  .tabs.status-tabs .tab.active.st-joined { background: var(--accent5); }
  .tabs.status-tabs .tab.active.st-done   { background: var(--accent3); }

  /* Event cards */
  .events-list { display: flex; flex-direction: column; gap: 10px; }

  .event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    transition: border-color 0.2s;
  }
  .event-card:hover { border-color: rgba(247,201,72,0.35); }

  .accent-bar { width: 4px; border-radius: 4px; align-self: stretch; flex-shrink: 0; }
  .accent-bar.st-todo   { background: var(--accent4); }
  .accent-bar.st-joined { background: var(--accent5); }
  .accent-bar.st-done   { background: var(--accent3); }

  .status-btn {
    flex-shrink: 0; border: none; border-radius: 8px;
    padding: 6px 10px; font-size: 11px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .status-btn.st-todo   { background: rgba(123,140,222,0.15); color: var(--accent4); }
  .status-btn.st-joined { background: rgba(255,159,67,0.15);  color: var(--accent5); }
  .status-btn.st-done   { background: rgba(107,255,184,0.12); color: var(--accent3); }
  .status-btn:hover { filter: brightness(1.2); transform: scale(1.03); }

  .event-info { flex: 1; min-width: 0; }
  .event-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }

  .event-category {
    font-size: 10px; padding: 2px 7px;
    border-radius: 20px; font-weight: 700;
  }
  .cat-retech  { background: rgba(123,140,222,0.2); color: var(--accent4); }
  .cat-shopping{ background: rgba(107,255,184,0.15); color: var(--accent3); }
  .cat-app     { background: rgba(247,201,72,0.15);  color: var(--accent); }

  .event-title {
    font-size: 14px; font-weight: 500; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .event-title.faded { color: var(--text-muted); }

  .dates-row { display: flex; gap: 12px; margin-top: 5px; flex-wrap: wrap; }

  .date-chip {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-muted);
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-deadline { background: var(--accent4); }
  .dot-reward   { background: var(--accent5); }
  .date-chip.urgent-text  { color: var(--accent2); font-weight: 700; }
  .date-chip.soon-text    { color: var(--accent);  font-weight: 600; }
  .date-chip.reward-soon  { color: var(--accent5); font-weight: 600; }
  .date-chip.reward-late  { color: var(--accent2); font-weight: 700; }

  .event-return { text-align: right; flex-shrink: 0; }
  .return-amount { font-size: 14px; font-weight: 700; color: var(--accent3); }
  .return-label  { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

  .delete-btn {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 14px; padding: 4px;
    border-radius: 6px; transition: all 0.2s; flex-shrink: 0;
  }
  .delete-btn:hover { color: var(--accent2); background: rgba(255,107,107,0.1); }

  .empty { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 13px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px; backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 24px;
    width: 100%; max-width: 420px;
  }
  .modal h2 { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 20px; }

  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 11px;
    color: var(--text-muted); margin-bottom: 6px; font-weight: 500;
  }
  .form-group input,
  .form-group select {
    width: 100%;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
    color: var(--text); font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface2); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .date-section {
    font-size: 11px; color: var(--text-muted);
    margin: 4px 0 12px; padding: 9px 12px;
    background: var(--surface); border-radius: 8px;
    border-left: 3px solid var(--accent4);
    line-height: 1.5;
  }

  .modal-btns { display: flex; gap: 8px; margin-top: 20px; }
  .btn-cancel {
    flex: 1; padding: 11px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-save {
    flex: 2; padding: 11px;
    background: var(--accent); border: none;
    border-radius: 10px; color: #0f0e17;
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-save:hover   { background: #ffd966; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>💰 짠테크 대시보드</h1>
    <p id="today-date"></p>
  </div>
  <button class="add-btn" onclick="openModal()">+ 이벤트 추가</button>
</div>

<div class="summary-grid">
  <div class="summary-card s1">
    <div class="label">참여 전</div>
    <div class="value" id="stat-todo">0</div>
    <div class="sub">개 이벤트</div>
  </div>
  <div class="summary-card s2">
    <div class="label">보상 대기 중</div>
    <div class="value" id="stat-joined">0</div>
    <div class="sub">개 이벤트</div>
  </div>
  <div class="summary-card s3">
    <div class="label">보상 확인 완료</div>
    <div class="value" id="stat-done">0</div>
    <div class="sub">개 이벤트</div>
  </div>
  <div class="summary-card s4">
    <div class="label">확정 수익 합계</div>
    <div class="value" id="stat-earned">0원</div>
    <div class="sub">완료 이벤트만</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><span class="legend-badge lb1">참여 전</span> 아직 참여 안 함</div>
  <div class="legend-item"><span class="legend-badge lb2">보상 대기</span> 참여 완료, 보상 입금 대기</div>
  <div class="legend-item"><span class="legend-badge lb3">완료</span> 보상 확인까지 끝</div>
  <div class="legend-tip">※ 상태 버튼 클릭 → 다음 단계로 이동</div>
</div>

<div class="tabs-wrapper">
  <div class="tabs-label">상태</div>
  <div class="tabs status-tabs" id="status-tabs">
    <button class="tab active" onclick="setTab('all',this,'status')">전체</button>
    <button class="tab" onclick="setTab('todo',this,'status')">참여 전</button>
    <button class="tab" onclick="setTab('joined',this,'status')">보상 대기</button>
    <button class="tab" onclick="setTab('done',this,'status')">완료</button>
  </div>
  <div class="tabs-label" style="margin-top:2px">카테고리</div>
  <div class="tabs cat-tabs" id="cat-tabs">
    <button class="tab active" onclick="setTab('cat-all',this,'cat')">전체</button>
    <button class="tab" onclick="setTab('retech',this,'cat')">재테크</button>
    <button class="tab" onclick="setTab('shopping',this,'cat')">쇼핑적립</button>
    <button class="tab" onclick="setTab('app',this,'cat')">앱테크</button>
  </div>
</div>

<div class="events-list" id="events-list"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <h2>✏️ 이벤트 추가</h2>
    <div class="form-group">
      <label>이벤트 이름 *</label>
      <input type="text" id="f-title" placeholder="예: 카카오뱅크 공모주 청약">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>카테고리</label>
        <select id="f-category">
          <option value="retech">재테크 이벤트</option>
          <option value="shopping">쇼핑 적립</option>
          <option value="app">앱테크</option>
        </select>
      </div>
      <div class="form-group">
        <label>예상 수익 (원)</label>
        <input type="number" id="f-return" placeholder="0" min="0">
      </div>
    </div>

    <div class="date-section">
      📌 <b>참여 마감일</b> — 언제까지 신청/참여해야 하는지<br>
      🎁 <b>보상 지급 예정일</b> — 포인트·캐시백·배정금이 들어오는 날
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>📌 참여 마감일</label>
        <input type="date" id="f-deadline">
      </div>
      <div class="form-group">
        <label>🎁 보상 지급 예정일</label>
        <input type="date" id="f-rewarddate">
      </div>
    </div>

    <div class="form-group">
      <label>메모 (선택)</label>
      <input type="text" id="f-memo" placeholder="참고사항을 입력하세요">
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveEvent()">저장하기</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'jjantech_v2';
  const STATUS_NEXT  = { todo:'joined', joined:'done', done:'todo' };
  const STATUS_LABEL = { todo:'참여 전', joined:'보상 대기', done:'완료' };
  const STATUS_CLASS = { todo:'st-todo', joined:'st-joined', done:'st-done' };

  function offsetDate(days) {
    const d = new Date(); d.setDate(d.getDate()+days);
    return d.toISOString().split('T')[0];
  }

  function getSample() {
    return [
      {id:1,title:'신한은행 공모주 청약',      category:'retech',  status:'todo',  deadline:offsetDate(2),  rewardDate:offsetDate(14), expectedReturn:50000, memo:'균등배정 노리기'},
      {id:2,title:'SSG 3만원 이상 캐시백',     category:'shopping',status:'joined',deadline:offsetDate(-3), rewardDate:offsetDate(5),  expectedReturn:3000,  memo:''},
      {id:3,title:'캐시워크 만보기 리워드',     category:'app',     status:'todo',  deadline:offsetDate(10), rewardDate:offsetDate(17), expectedReturn:5000,  memo:'매일 체크'},
      {id:4,title:'청년 청약통장 납입',         category:'retech',  status:'joined',deadline:offsetDate(-5), rewardDate:offsetDate(20), expectedReturn:0,     memo:'이달 납입 완료'},
      {id:5,title:'쿠팡 로켓와우 적립금',       category:'shopping',status:'done',  deadline:offsetDate(-10),rewardDate:offsetDate(-2), expectedReturn:2400,  memo:''},
    ];
  }

  function loadEvents() {
    try { const s=localStorage.getItem(STORAGE_KEY); return s?JSON.parse(s):getSample(); }
    catch { return getSample(); }
  }
  function saveEvents() { try{localStorage.setItem(STORAGE_KEY,JSON.stringify(events));}catch{} }

  let events = loadEvents();
  let nextId = events.reduce((m,e)=>Math.max(m,e.id),0)+1;
  let currentStatus = 'all';
  let currentCat = 'cat-all';

  function getDaysLeft(dateStr) {
    if(!dateStr) return null;
    const today=new Date(); today.setHours(0,0,0,0);
    const d=new Date(dateStr); d.setHours(0,0,0,0);
    return Math.round((d-today)/86400000);
  }

  function formatMoney(n) {
    if(!n) return '0원';
    if(n>=10000) return (n/10000).toFixed(n%10000===0?0:1)+'만원';
    return n.toLocaleString()+'원';
  }

  function deadlineChip(e) {
    if(!e.deadline) return '';
    const days=getDaysLeft(e.deadline);
    let text='',cls='';

    if(e.status==='done'||e.status==='joined') {
      text=`참여 마감 ${e.deadline.slice(5).replace('-','/')}`;
    } else {
      if(days<0)       {text=`마감 ${Math.abs(days)}일 초과`;cls='urgent-text';}
      else if(days===0){text='오늘 마감!';                   cls='urgent-text';}
      else if(days===1){text='내일 마감!';                   cls='urgent-text';}
      else if(days<=3) {text=`${days}일 후 마감`;            cls='urgent-text';}
      else if(days<=7) {text=`${days}일 후 마감`;            cls='soon-text';}
      else             {text=`참여 마감 ${e.deadline.slice(5).replace('-','/')}`;}
    }
    return `<div class="date-chip ${cls}"><span class="dot dot-deadline"></span>${text}</div>`;
  }

  function rewardChip(e) {
    if(!e.rewardDate) return '';
    const days=getDaysLeft(e.rewardDate);
    let text='',cls='';

    if(e.status==='done') {
      text='보상 확인 완료 ✓';
    } else if(e.status==='joined') {
      if(days<0)       {text=`보상 ${Math.abs(days)}일 지연?`;cls='reward-late';}
      else if(days===0){text='오늘 보상 지급!';               cls='reward-soon';}
      else if(days<=5) {text=`${days}일 후 보상 예정`;        cls='reward-soon';}
      else             {text=`보상 예정 ${e.rewardDate.slice(5).replace('-','/')}`;}
    } else {
      text=`보상 예정 ${e.rewardDate.slice(5).replace('-','/')}`;
    }
    return `<div class="date-chip ${cls}"><span class="dot dot-reward"></span>${text}</div>`;
  }

  function setTab(tab, el, group) {
    if (group === 'status') {
      currentStatus = tab;
      document.querySelectorAll('#status-tabs .tab').forEach(t => t.classList.remove('active'));
    } else {
      currentCat = tab;
      document.querySelectorAll('#cat-tabs .tab').forEach(t => t.classList.remove('active'));
    }
    el.classList.add('active');
    render();
  }

  function render() {
    const todo   = events.filter(e=>e.status==='todo').length;
    const joined = events.filter(e=>e.status==='joined').length;
    const done   = events.filter(e=>e.status==='done').length;
    const earned = events.filter(e=>e.status==='done').reduce((s,e)=>s+(e.expectedReturn||0),0);

    document.getElementById('stat-todo').textContent   = todo;
    document.getElementById('stat-joined').textContent = joined;
    document.getElementById('stat-done').textContent   = done;
    document.getElementById('stat-earned').textContent = formatMoney(earned);

    let filtered=[...events];
    // 상태 필터
    if     (currentStatus==='todo')   filtered=filtered.filter(e=>e.status==='todo');
    else if(currentStatus==='joined') filtered=filtered.filter(e=>e.status==='joined');
    else if(currentStatus==='done')   filtered=filtered.filter(e=>e.status==='done');
    // 카테고리 필터
    if     (currentCat==='retech')   filtered=filtered.filter(e=>e.category==='retech');
    else if(currentCat==='shopping') filtered=filtered.filter(e=>e.category==='shopping');
    else if(currentCat==='app')      filtered=filtered.filter(e=>e.category==='app');

    const ORDER={todo:0,joined:1,done:2};
    filtered.sort((a,b)=>{
      if(ORDER[a.status]!==ORDER[b.status]) return ORDER[a.status]-ORDER[b.status];
      return new Date(a.deadline||'9999')-new Date(b.deadline||'9999');
    });

    const list=document.getElementById('events-list');
    if(filtered.length===0){
      list.innerHTML=`<div class="empty">이벤트가 없어요 🙂<br>위에서 추가해 보세요!</div>`;
      return;
    }

    const catMap={retech:['재테크','cat-retech'],shopping:['쇼핑적립','cat-shopping'],app:['앱테크','cat-app']};
    list.innerHTML=filtered.map(e=>{
      const[catLabel,catClass]=catMap[e.category]||['기타','cat-app'];
      return `
        <div class="event-card">
          <div class="accent-bar ${STATUS_CLASS[e.status]}"></div>
          <button class="status-btn ${STATUS_CLASS[e.status]}" onclick="cycleStatus(${e.id})">
            ${STATUS_LABEL[e.status]}
          </button>
          <div class="event-info">
            <div class="event-meta">
              <span class="event-category ${catClass}">${catLabel}</span>
            </div>
            <div class="event-title ${e.status==='done'?'faded':''}">${e.title}</div>
            <div class="dates-row">
              ${deadlineChip(e)}
              ${rewardChip(e)}
              ${e.memo?`<div class="date-chip"><span style="color:var(--text-dim)">·</span>${e.memo}</div>`:''}
            </div>
          </div>
          <div class="event-return">
            <div class="return-amount">${e.expectedReturn>0?'+'+formatMoney(e.expectedReturn):'-'}</div>
            <div class="return-label">${e.status==='done'?'확정 수익':'예상 수익'}</div>
          </div>
          <button class="delete-btn" onclick="deleteEvent(${e.id})">✕</button>
        </div>`;
    }).join('');
  }

  function cycleStatus(id) {
    const e=events.find(x=>x.id===id);
    if(e){ e.status=STATUS_NEXT[e.status]; saveEvents(); render(); }
  }

  function deleteEvent(id) {
    if(!confirm('이벤트를 삭제할까요?')) return;
    events=events.filter(x=>x.id!==id); saveEvents(); render();
  }

  function openModal() {
    document.getElementById('modal').style.display='flex';
    document.getElementById('f-deadline').value  =offsetDate(7);
    document.getElementById('f-rewarddate').value=offsetDate(21);
    document.getElementById('f-title').focus();
  }

  function closeModal() {
    document.getElementById('modal').style.display='none';
    ['f-title','f-return','f-memo'].forEach(id=>document.getElementById(id).value='');
  }

  function saveEvent() {
    const title=document.getElementById('f-title').value.trim();
    if(!title){document.getElementById('f-title').focus();return;}
    events.push({
      id:nextId++, title,
      category:      document.getElementById('f-category').value,
      status:        'todo',
      deadline:      document.getElementById('f-deadline').value||offsetDate(7),
      rewardDate:    document.getElementById('f-rewarddate').value||'',
      expectedReturn:parseInt(document.getElementById('f-return').value)||0,
      memo:          document.getElementById('f-memo').value.trim()
    });
    saveEvents(); closeModal(); render();
  }

  const now=new Date();
  document.getElementById('today-date').textContent=
    now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
  render();
</script>
</body>
</html>
